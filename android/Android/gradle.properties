org.gradle.jvmargs=-Xmx6g
# The Kotlin compiler runs in its own daemon with a separate heap that
# org.gradle.jvmargs does NOT cover. SkipUI's release compile (whole-program IR
# codegen) OOMs the default; bump it explicitly or `skip export` fails with
# "Not enough memory to run compilation".
kotlin.daemon.jvmargs=-Xmx8g
android.useAndroidX=true
kotlin.code.style=official
